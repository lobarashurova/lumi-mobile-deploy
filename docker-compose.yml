version: '3.7'
name: lumi-mobile-backend

services:
  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: always
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - TZ=Asia/Tashkent
    volumes:
      - ./uploads:/usr/src/app/uploads
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - mongodb
      - redis
    networks:
      - shared-network

  mongodb:
    container_name: mongodb
    image: mongo:latest
    ports:
      - '27017:27017'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - TZ=Asia/Tashkent

    volumes:
      - mongo-data:/data/db/
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - shared-network

  redis:
    container_name: cache
    image: redis
    ports:
      - 6390:6379
    volumes:
      - redis:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - shared-network

volumes:
  mongo-data:
  redis:
    driver: local

networks:
  shared-network:
    external: true
