name: Check ESLint

on:
  pull_request:
    branches: [master]

jobs:
  Lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v2
      - name: installing eslint
        run: npm i -g eslint
      - name: install dev dependencies
        run: npm install @typescript-eslint/eslint-plugin @typescript-eslint/parser eslint-config-prettier eslint-plugin-prettier
      - name: Fixing Files
        run: npm run lint
